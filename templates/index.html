<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日 TIME · 健康 · 科技 · 商业</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-left">
        <div class="logo-mark">T</div>
        <div>
          <h1 class="masthead-title">每日 <em>TIME</em></h1>
          <p class="masthead-sub">健康 · 科技 · 商业 — 每天 3 个板块，各 3 篇新鲜文章</p>
        </div>
      </div>
      <div class="masthead-right">
        <div class="date-control">
          <label for="date-select">查看日期</label>
          <select id="date-select"></select>
        </div>
        <button id="refresh-btn" class="btn-refresh" title="立即重新抓取今天">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3-6.7" />
            <path d="M21 4v5h-5" />
          </svg>
          <span>立即刷新</span>
        </button>
      </div>
    </div>
    <div class="masthead-meta">
      <span id="meta-date">—</span>
      <span class="dot">·</span>
      <span id="meta-fetched">—</span>
      <span class="dot">·</span>
      <span id="meta-count">—</span>
    </div>
    <nav class="topnav">
      <a href="/" class="active">Today</a>
      <a href="/library">Library</a>
      <a href="/vocabulary">Vocabulary</a>
    </nav>
  </header>

  <main id="main"></main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <footer class="foot">
    <p>
      数据来源：
      <a href="https://time.com/section/health/" target="_blank" rel="noopener">TIME Health</a> ·
      <a href="https://time.com/section/tech/" target="_blank" rel="noopener">TIME Tech</a> ·
      <a href="https://time.com/section/business/" target="_blank" rel="noopener">TIME Business</a>
    </p>
    <p class="foot-mini">每天 08:00 (Asia/Shanghai) 自动抓取；也可手动刷新</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
